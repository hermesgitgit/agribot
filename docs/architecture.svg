<svg width="100%" viewBox="0 0 760 660" role="img" xmlns="http://www.w3.org/2000/svg">
<title>agribot 架構圖</title>
<desc>自主農務監控 Telegram bot 的分層架構：使用者經 Telegram Bot API 連到 agriweather_scraper.py 主程式，主程式並行啟動四條迴圈——Telegram 介面(tg/)、排程農務報告(services/push)、安全哨兵(services/sentinel)、看門狗(watchdog)。它們呼叫 agent/ agentic 核心：session（Gemini ReAct 多工具迴圈、重試與報告備援）、tools（感測/天氣/歷史/施肥收成登記/知識庫等工具）、pending（收成施肥待確認加鎖）、guard（閉環控制指令防護），並用 science/ 做領域計算（GDD/ET₀/病害風險）。依賴的服務與資料：Google Gemini（agentic 大腦）、NVIDIA（報告備援 gpt-oss-120b）、阿龜物聯網 IoT 與中央氣象署 CWA（經 Playwright 爬蟲抓取）、storage/ 的 SQLite 資料與 knowledge.db 知識庫 RAG（由農業部出版品離線 OCR 建立）。</desc>
<style>
text{font-family:'Helvetica Neue',Arial,'PingFang TC','Microsoft JhengHei','Noto Sans CJK TC',sans-serif;fill:#1a1a1a}
.t{font-size:14px}.ts{font-size:11px;fill:#5f6368}.th{font-size:13.5px;font-weight:500}
.box{fill:#fafafa;stroke:#d0d3d7;stroke-width:1}
.arr{stroke:#6b7075;stroke-width:1.5;fill:none}
.c-blue rect{fill:#e6f1fb;stroke:#3b82c4;stroke-width:1}.c-blue .th{fill:#0c447c}.c-blue .ts{fill:#2a6099}
.c-amber rect{fill:#fdf1dd;stroke:#c98a1e;stroke-width:1}.c-amber .th{fill:#7a4e0b}.c-amber .ts{fill:#8a5a14}
.c-gray rect{fill:#eef0f2;stroke:#9aa0a6;stroke-width:1}.c-gray .th{fill:#3c4043}.c-gray .ts{fill:#5f6368}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#6b7075" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="40" y="26" style="font-size:16px">agribot 架構圖（自主農務監控）</text>

<!-- 連線 -->
<line class="arr" x1="380" y1="80" x2="380" y2="98" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line class="arr" x1="380" y1="138" x2="380" y2="152" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line class="arr" x1="380" y1="242" x2="380" y2="264" marker-end="url(#arrow)"/>
<line class="arr" x1="380" y1="354" x2="380" y2="378" marker-end="url(#arrow)"/>
<polyline class="arr" points="557,588 557,560 557,520" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

<!-- 使用者 / Bot API -->
<g class="c-gray"><rect x="290" y="42" width="180" height="38" rx="8"/><text class="th" x="380" y="66" text-anchor="middle">使用者 · Telegram</text></g>
<g class="c-amber"><rect x="280" y="98" width="200" height="40" rx="8"/><text class="th" x="380" y="123" text-anchor="middle">Telegram Bot API</text></g>

<!-- 主程式：四條並行迴圈 -->
<rect class="box" x="24" y="152" width="712" height="90" rx="10"/>
<text class="th" x="38" y="172">agriweather_scraper.py</text>
<text class="ts" x="205" y="172">主程式 · 並行啟動下列四條迴圈</text>
<g class="c-blue"><rect x="38" y="180" width="166" height="54" rx="8"/><text class="th" x="121" y="202" text-anchor="middle">Telegram 介面</text><text class="ts" x="121" y="221" text-anchor="middle">tg/ 輪詢·訊息/照片·發送</text></g>
<g class="c-blue"><rect x="212" y="180" width="166" height="54" rx="8"/><text class="th" x="295" y="202" text-anchor="middle">排程報告</text><text class="ts" x="295" y="221" text-anchor="middle">push · 每日農務分析</text></g>
<g class="c-blue"><rect x="386" y="180" width="166" height="54" rx="8"/><text class="th" x="469" y="202" text-anchor="middle">安全哨兵</text><text class="ts" x="469" y="221" text-anchor="middle">sentinel · 異常→緊急預警</text></g>
<g class="c-blue"><rect x="560" y="180" width="164" height="54" rx="8"/><text class="th" x="642" y="202" text-anchor="middle">看門狗</text><text class="ts" x="642" y="221" text-anchor="middle">watchdog · sweep·心跳</text></g>

<!-- agent 核心 -->
<rect class="box" x="24" y="264" width="712" height="90" rx="10"/>
<text class="th" x="38" y="284">agent/</text>
<text class="ts" x="92" y="284">agentic 核心（被上層呼叫）</text>
<g class="c-blue"><rect x="38" y="292" width="196" height="54" rx="8"/><text class="th" x="136" y="314" text-anchor="middle">session</text><text class="ts" x="136" y="333" text-anchor="middle">Gemini ReAct·重試·報告備援</text></g>
<g class="c-blue"><rect x="242" y="292" width="172" height="54" rx="8"/><text class="th" x="328" y="314" text-anchor="middle">tools 工具集</text><text class="ts" x="328" y="333" text-anchor="middle">感測·天氣·歷史·登記·RAG</text></g>
<g class="c-blue"><rect x="422" y="292" width="150" height="54" rx="8"/><text class="th" x="497" y="314" text-anchor="middle">pending · guard</text><text class="ts" x="497" y="333" text-anchor="middle">待確認(鎖)·指令防護</text></g>
<g class="c-blue"><rect x="580" y="292" width="144" height="54" rx="8"/><text class="th" x="652" y="314" text-anchor="middle">science</text><text class="ts" x="652" y="333" text-anchor="middle">GDD·ET₀·病害</text></g>

<!-- 依賴：外部服務與資料 -->
<rect class="box" x="24" y="378" width="712" height="156" rx="10"/>
<text class="ts" x="38" y="396">agent 依賴的外部服務與資料</text>
<g class="c-amber"><rect x="38" y="404" width="162" height="50" rx="8"/><text class="th" x="119" y="424" text-anchor="middle">Google Gemini</text><text class="ts" x="119" y="442" text-anchor="middle">agentic 大腦</text></g>
<g class="c-amber"><rect x="210" y="404" width="162" height="50" rx="8"/><text class="th" x="291" y="424" text-anchor="middle">NVIDIA</text><text class="ts" x="291" y="442" text-anchor="middle">報告備援 gpt-oss-120b</text></g>
<g class="c-amber"><rect x="382" y="404" width="164" height="50" rx="8"/><text class="th" x="464" y="424" text-anchor="middle">阿龜物聯網 IoT</text><text class="ts" x="464" y="442" text-anchor="middle">土壤·EC·溫濕</text></g>
<g class="c-amber"><rect x="556" y="404" width="168" height="50" rx="8"/><text class="th" x="640" y="424" text-anchor="middle">中央氣象署 CWA</text><text class="ts" x="640" y="442" text-anchor="middle">天氣預報</text></g>
<g class="c-gray"><rect x="38" y="462" width="340" height="50" rx="8"/><text class="th" x="208" y="482" text-anchor="middle">storage/ · SQLite</text><text class="ts" x="208" y="500" text-anchor="middle">感測·事件·收成·預測·狀態</text></g>
<g class="c-gray"><rect x="388" y="462" width="336" height="50" rx="8"/><text class="th" x="556" y="482" text-anchor="middle">knowledge.db · 知識庫 RAG</text><text class="ts" x="556" y="500" text-anchor="middle">農業部出版品全文檢索</text></g>
<text class="ts" x="382" y="528">阿龜／CWA 經 scrapers/ + Playwright(Chromium) 抓取</text>

<!-- 離線建庫 -->
<g class="c-gray"><rect x="24" y="588" width="712" height="40" rx="8"/><text class="ts" x="380" y="612" text-anchor="middle">離線建庫：農業部出版品 PDF → OCR（scripts/ocr_pdf）→ knowledge.db</text></g>

<!-- 圖例 -->
<g class="c-blue"><rect x="150" y="640" width="12" height="12" rx="3"/></g><text class="ts" x="168" y="650">程式模組</text>
<g class="c-amber"><rect x="290" y="640" width="12" height="12" rx="3"/></g><text class="ts" x="308" y="650">外部服務</text>
<g class="c-gray"><rect x="430" y="640" width="12" height="12" rx="3"/></g><text class="ts" x="448" y="650">資料 / 離線</text>
</svg>
